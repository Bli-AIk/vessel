name: Build and Upload Assets

on:
  push:
    tags:
      - 'v*'
      - 'vessel-v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vessel
            archive_name: vessel-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vessel.exe
            archive_name: vessel-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vessel
            archive_name: vessel-macos-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang mold

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" dist/package/
          cp readme.md LICENSE-MIT LICENSE-APACHE dist/package/
          tar czf "dist/${{ matrix.archive_name }}.tar.gz" -C dist/package .

      - name: Package archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" dist/package/
          Copy-Item readme.md, LICENSE-MIT, LICENSE-APACHE dist/package/
          Compress-Archive -Path dist/package/* -DestinationPath "dist/${{ matrix.archive_name }}.zip"

      - name: Upload Release Asset (Unix)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.archive_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.archive_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
