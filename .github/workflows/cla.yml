name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PAT }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/Bli-AIk/vessel/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'bot*,'
          custom-notsigned-prcomment: 'Thank you for your contribution to Vessel. Please sign the [Contributor License Agreement (CLA)](https://github.com/Bli-AIk/vessel/blob/main/CLA.md) before merging.<br/>If you agree, please reply directly below with the following text:<br/> **I have read the CLA Document and I hereby sign the CLA**'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
